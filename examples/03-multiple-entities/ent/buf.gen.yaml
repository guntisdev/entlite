version: v2
plugins:
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: gen/pb
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/pb
    opt: 
      - paths=source_relative
      - package_suffix=
  - remote: buf.build/bufbuild/es:v2.11.0
    out: gen/ts
    opt: 
      - target=ts
    include_imports: true