version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/pb
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/pb
    opt: 
      - paths=source_relative
      - package_suffix=
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt: 
      - target=ts
      - json_types=true # Generates types for JSON serialization
      - int64_type=number # Forces int64 to be treated as number in TS
  - remote: buf.build/connectrpc/es
    out: gen/ts
    opt: target=ts
