syntax = "proto3";

package entlite;

option go_package = "./pb";

import "buf/validate/validate.proto";

// Post represents as post entity
message Post {
  int32 ID = 1 [(buf.validate.field).required = true];
  string title = 2 [(buf.validate.field).required = true];
  string content = 3 [(buf.validate.field).required = true];
  bool published = 4;
}

// User represents as user entity
message User {
  int32 ID = 1 [(buf.validate.field).required = true];
  string email = 2 [(buf.validate.field).required = true];
  string name = 3 [(buf.validate.field).required = true];
}

message GetPostByIDRequest {
  int32 ID = 1 [(buf.validate.field).required = true];
}

// PostService provides CRUD opertions for Post entities
service PostService {
  rpc GetByID(GetPostByIDRequest) returns (Post);
}



// UserService provides CRUD opertions for User entities
service UserService {
}