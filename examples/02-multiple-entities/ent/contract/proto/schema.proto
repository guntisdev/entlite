syntax = "proto3";

package entlite;

option go_package = "./pb";

import "google/protobuf/empty.proto";

// Post represents as post entity
message Post {
  int32 id = 1;
  string title = 2;
  string content = 3;
  bool published = 4;
}

// User represents as user entity
message User {
  int32 id = 1;
  string email = 2;
  string name = 3;
}

message GetPostRequest {
  int32 id = 1;
}
message ListPostRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListPostResponse {
  repeated Post posts = 1;
}

// PostService provides CRUD opertions for Post entities
service PostService {
  rpc Get(GetPostRequest) returns (Post);
  rpc List(ListPostRequest) returns (ListPostResponse);
}

message CreateUserRequest {
  string email = 2;
  string name = 3;
}
message GetUserRequest {
  int32 id = 1;
}
message UpdateUserRequest {
  int32 id = 1;
  string email = 2;
  string name = 3;
}
message DeleteUserRequest {
  int32 id = 1;
}
message ListUserRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListUserResponse {
  repeated User users = 1;
}

// UserService provides CRUD opertions for User entities
service UserService {
  rpc Create(CreateUserRequest) returns (User);
  rpc Get(GetUserRequest) returns (User);
  rpc Update(UpdateUserRequest) returns (User);
  rpc Delete(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc List(ListUserRequest) returns (ListUserResponse);
}