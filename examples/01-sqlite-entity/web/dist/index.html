<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
  <title>Basic entity sqlite</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 2rem;
      background: #f5f5f5;
      color: #333;
    }
    
    h1 {
      margin-bottom: 0.5rem;
      color: #333;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #e5e5e5;
    }
    
    button {
      min-width: 80px;
      height: 40px;
      padding: 0 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .button-group {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem;
      background: rgba(0,0,0,0.03);
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.1);
      height: 40px;
    }
    
    .button-group input {
      width: 50px;
      height: 30px;
      padding: 0 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.9rem;
      text-align: center;
    }
    
    .button-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
    }
    
    /* Hide number input spinner arrows */
    .button-group input[type="number"]::-webkit-inner-spin-button,
    .button-group input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    #createBtn {
      background: #10b981;
      color: white;
    }
    
    #getBtn {
      background: #3b82f6;
      color: white;
    }
    
    #listBtn {
      background: #8b5cf6;
      color: white;
    }
    
    #updateBtn {
      background: #f59e0b;
      color: white;
    }
    
    #deleteBtn {
      background: #ef4444;
      color: white;
    }
    
    #clearBtn {
      background: #6b7280;
      color: white;
    }
    
    #output {
      background: #1e293b;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 4px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    
    #output div {
      padding: 0.25rem 0;
      border-bottom: 1px solid #334155;
    }
    
    #output div:last-child {
      border-bottom: none;
    }
    
    .info-container {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .info {
      flex: 1;
      padding: 1rem;
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      border-radius: 4px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Basic entity sqlite</h1>
    <p class="subtitle">Testing generated TypeScript types and gRPC Connect client</p>
    
    <div class="controls">
      <button id="createBtn">Create</button>
      <div class="button-group">
        <input type="number" id="getId" placeholder="ID" value="1">
        <button id="getBtn">Get</button>
      </div>
      <div class="button-group">
        <input type="number" id="updateId" placeholder="ID" value="1">
        <button id="updateBtn">Update</button>
      </div>
      <button id="listBtn">List</button>
      <div class="button-group">
        <input type="number" id="deleteId" placeholder="ID" value="1">
        <button id="deleteBtn">Delete</button>
      </div>
    </div>
    
    <div id="output"></div>
    
    <div class="info-container">
      <div class="info">
        <strong>What's happening:</strong><br>
        This page uses TypeScript types generated from your proto schema. 
        The client uses Connect-Web to call your Go gRPC server.
        All types are fully type-safe!
      </div>
      <button id="clearBtn">Clear</button>
    </div>
  </div>
  
  <script type="module" src="bundle.js"></script>
</body>
</html>
