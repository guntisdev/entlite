syntax = "proto3";

package entlite;

option go_package = "./pb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "buf/validate/validate.proto";

// User represents as user entity
message User {
  int32 ID = 1 [(buf.validate.field).required = true];
  string email = 2 [(buf.validate.field).required = true];
  // Full name, e.g. \"Jane Doe\
  string name = 3 [(buf.validate.field).required = true];
  optional int32 age = 4;
  bytes api_key = 6 [(buf.validate.field).required = true];
  bool is_active = 7;
  int64 login_count = 8 [(buf.validate.field).required = true];
  double rating = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_at = 10 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_at = 11 [(buf.validate.field).required = true];
}

message CreateUserRequest {
  string email = 2 [(buf.validate.field).required = true];
  // Full name, e.g. \"Jane Doe\
  string name = 3 [(buf.validate.field).required = true];
  optional int32 age = 4;
  string password = 5 [(buf.validate.field).required = true];
  optional bytes api_key = 6;
  optional bool is_active = 7;
  optional int64 login_count = 8;
  optional double rating = 9;
}
message GetUserByIDRequest {
  int32 ID = 1 [(buf.validate.field).required = true];
}
message UpdateUserRequest {
  int32 ID = 1 [(buf.validate.field).required = true];
  string email = 2 [(buf.validate.field).required = true];
  // Full name, e.g. \"Jane Doe\
  string name = 3 [(buf.validate.field).required = true];
  optional int32 age = 4;
  optional string password = 5;
  optional bool is_active = 7;
  optional int64 login_count = 8;
  optional double rating = 9;
}
message DeleteUserRequest {
  int32 ID = 1 [(buf.validate.field).required = true];
}
message GetUserByEmailRequest {
  string email = 2 [(buf.validate.field).required = true];
}
message ListUserByIsActiveRequest {
  int32 limit = 1 [(buf.validate.field).required = true];
  int32 offset = 2;
  bool is_active = 3 [(buf.validate.field).required = true];
}

message ListUserByIsActiveResponse {
  repeated User users = 1;
}
message ListUserFilterByAgeNameRequest {
  int32 limit = 1 [(buf.validate.field).required = true];
  int32 offset = 2;
  int32 min_age = 3 [(buf.validate.field).required = true];
  int32 max_age = 4 [(buf.validate.field).required = true];
  string name = 5 [(buf.validate.field).required = true];
}

message ListUserFilterByAgeNameResponse {
  repeated User users = 1;
}

// UserService provides CRUD opertions for User entities
service UserService {
  rpc Create(CreateUserRequest) returns (User);
  rpc GetByID(GetUserByIDRequest) returns (User);
  rpc Update(UpdateUserRequest) returns (User);
  rpc Delete(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc GetByEmail(GetUserByEmailRequest) returns (User);
  rpc ListByIsActive(ListUserByIsActiveRequest) returns (ListUserByIsActiveResponse);
  rpc FilterByAgeName(ListUserFilterByAgeNameRequest) returns (ListUserFilterByAgeNameResponse);
}